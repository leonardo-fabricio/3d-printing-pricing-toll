name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            name: macOS (Apple Silicon)
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            name: macOS (Intel)
          - platform: windows-latest
            args: ''
            name: Windows

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: build-${{ github.run_number }}
          releaseName: '3D Print Pricer — Build ${{ github.run_number }}'
          releaseBody: |
            ## Download

            | Plataforma | Arquivo |
            |---|---|
            | Windows | `.msi` ou `-setup.exe` |
            | macOS Apple Silicon (M1/M2/M3) | `.dmg` (aarch64) |
            | macOS Intel | `.dmg` (x86_64) |

            Instale o arquivo correspondente ao seu sistema operacional.

            > **Windows:** Se aparecer aviso do Defender, clique em "Mais informações" → "Executar assim mesmo".
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
